database:
  url: jdbc:h2:mem:issuedb
  username: root
  password: password
  driver-class-name: org.h2.Driver

jpa:
  hibernate:
    ddl-auto: update
  show-sql: true

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: your-256-bit-secret-key-here
  expiration: 86400000 # 24 hours in milliseconds

file:
  upload-dir: ./uploads

spring:
  application:
    name: municipal-issue-raiser
  datasource:
    url: jdbc:h2:mem:issuedb
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.municipal.issueraiser: INFO
    org.springframework: INFO